  goal: Integrate real agent systems with the dashboard by adding a WebSocket server to the coordinator, mocking external dependencies (Hedera, Uniswap, Base RPC, 0G) in demo mode while routing real events through our own infrastructure (coordinator, agent-defi, cre-risk-router). Mock the obey daemon in demo mode to avoid polluting real sessions. In live mode, connect to the real obey daemon, real HCS topics, and real agent binaries. The dashboard must prove our systems work — not just display fabricated client-side data.
